# Oneshot project configuration
#
# Location: ~/.claude/oneshot/{project_name}/config.yml
#
# This file is generated by /oneshot:new-project and edited as needed.
# See DESIGN.md for the full specification of every knob.

# ─── Remote server ────────────────────────────────────────────────────────────
#
# The machine that runs sandbox containers. Must be reachable over SSH from
# the operator's local machine. Any Linux/Unix host works — no hardware
# assumptions baked in.

server:
  host: workstation.local       # SSH target (hostname or user@host)
  volume_root: /var/lib/oneshot # server-persistent volume path for run artifacts

# ─── Sandbox resource configuration ───────────────────────────────────────────
#
# Three layers: defaults → named profiles → per-run CLI flags.
# Resolution order: CLI flags > profile > defaults.
# See DESIGN.md §4 "Resource configuration".

sandbox:
  defaults:
    cpu: 4.0                    # Docker --cpus (fractional cores allowed)
    memory: 8g                  # Docker --memory
    disk: 20g                   # worktree volume quota
    gpu: false                  # GPU passthrough
  profiles:
    discuss: { cpu: 2, memory: 4g }       # discussion sandbox (lightweight, interactive)
    small:   { cpu: 2, memory: 4g }
    medium:  { cpu: 4, memory: 8g }
    large:   { cpu: 8, memory: 16g }
    xlarge:  { cpu: 12, memory: 32g }
    gpu:     { cpu: 4, memory: 16g, gpu: true }

# ─── Skills and MCP carryover ─────────────────────────────────────────────────
#
# Default: inherit everything from the host. Snapshot at dispatch, not live
# mount — reproducibility, auditability, debuggability.
# See DESIGN.md §4 "Skills & MCP carryover".

skills:
  mode: inherit                 # inherit | explicit | none
  exclude:                      # opt-out when mode=inherit
    - gmail                     # requires interactive OAuth
    # - using-git-worktrees     # uncomment if sandbox has no host git state
  # include:                    # used when mode=explicit
  #   - test-driven-development
  #   - systematic-debugging

mcp:
  mode: inherit                 # inherit | explicit | none
  exclude:
    - notion                    # OAuth browser flow, doesn't work in sandbox
  credentials:
    pass: all                   # all | none | allowlist
    # allow:                    # used when pass=allowlist
    #   - github
    #   - context7

# ─── Scoring thresholds ───────────────────────────────────────────────────────
#
# See DESIGN.md §"Scoring Model" and §"Open Questions → Scorer mechanics".
# All values are v1 starting points. Calibrate over time from calibration.md.

scoring:
  soft_gate: 75                 # overall score required to dispatch without --force
  plateau_window: 3             # turns to consider for plateau detection
  plateau_delta: 5              # minimum overall movement across plateau_window
  dimensions:                   # weights — equal by default
    correctness: 1.0
    quality: 1.0
    completeness: 1.0
    robustness: 1.0
    ambiguity: 1.0              # requirements only (not in PR review)

# ─── Discussion sandbox ───────────────────────────────────────────────────────
#
# See DESIGN.md §2 "Discussion sandbox".

discussion:
  idle_timeout_s: 1800          # 30 min — tear down if no exploration calls
  hard_cap_s: 14400             # 4 hours — absolute ceiling regardless of activity
  fetch_max_bytes: 262144       # 256 KB — limit for sandbox_fetch

# ─── CI Gate ──────────────────────────────────────────────────────────────────
#
# See DESIGN.md §6 "CI Gate".

ci:
  initial_wait_s: 120           # how long the original sandbox watches CI before detaching
  poll_interval_s: 60           # how often the orchestrator re-polls during ci_pending
  max_fix_attempts: 3           # automatic fix cycles before giving up
  max_wait_s: 14400             # 4 hour ceiling on total ci_pending time
  flaky_retry: true             # re-run a failed check once before treating as real
  required:
    mode: from_branch_protection  # from_branch_protection | explicit | none
    # explicit alternative:
    # mode: explicit
    # list:
    #   - lint
    #   - test-unit
    #   - test-integration

# ─── Storage ──────────────────────────────────────────────────────────────────
#
# See DESIGN.md §"Storage Topology".

storage:
  server_gc_grace_days: 7       # retain server-side runs this long after local rsync
